<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lớp Nhà trẻ Mỹ Hưng</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fa;
}

/* HERO */
.hero {
    position: relative;
    text-align: center;
    color: white;
}

.hero img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    filter: brightness(70%);
}

.hero-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* SECTION */
.section {
    padding: 20px;
}

.title {
    text-align: center;
    margin-bottom: 10px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

/* CARD */
.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

/* VIDEO 16:9 */
.thumbnail {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
}

.card p {
    padding: 10px;
    font-weight: bold;
}

/* BUTTON */
.button {
    display: block;
    text-align: center;
    background: #ff8fab;
    color: white;
    padding: 10px;
    border-radius: 20px;
    margin: 10px auto;
    text-decoration: none;
    width: 200px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <img src="https://drive.google.com/uc?export=view&id=16CAo7WW9TYNEAC1kkybdEzGIhl83sn75">

        <p>Nơi ươm mầm những em bé hạnh phúc</p>
    </div>
</div>
