<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lớp Nhà trẻ 24-36 tháng</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Fredoka', sans-serif;
    margin: 0;
    background: linear-gradient(#fff0f6, #e6faff);
}

/* HEADER */
header {
    text-align: center;
    padding: 30px;
}

header img {
    width: 100%;
    max-height: 300px;
    border-radius: 20px;
}

h1 {
    color: #ff4d8d;
}

/* SECTION */
section {
    padding: 30px;
}

.section-title {
    text-align: center;
    font-size: 26px;
    color: #ff4d8d;
    margin-bottom: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px,1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
    position: relative;
}

.card:hover {
    transform: scale(1.05) rotate(-1deg);
}

/* RUNG */
.card:active {
    animation: shake 0.3s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    50% { transform: translateX(3px); }
    75% { transform: translateX(-3px); }
    100% { transform: translateX(0); }
}

/* ICON PLAY */
.card::after {
    content: "▶";
    position: absolute;
    font-size: 40px;
    color: white;
    top: 40%;
    left: 45%;
    opacity: 0;
    transition: 0.3s;
}

.card:hover::after {
    opacity: 1;
}

.card img {
    width: 100%;
}

/* TITLE */
.card-title {
    padding: 12px;
    font-size: 16px;
    color: #ff4d8d;
    background: #fff0f6;
    text-align: center;
}

/* POPUP */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}

.modal-content {
    margin: 5% auto;
    width: 80%;
}

.modal iframe {
    width: 100%;
    height: 500px;
}

.close {
    font-size: 30px;
    color: white;
    float: right;
    cursor: pointer;
}

/* BUTTON */
.btn {
    background: #ff4d8d;
    color: white;
    padding: 12px 20px;
    border-radius: 25px;
    text-decoration: none;
    display: inline-block;
    margin: 10px;
}
</style>
</head>

<body>

<header>
<h1>Lớp Nhà trẻ 24-36 tháng</h1>
<p>Nơi cất cánh những em bé hạnh phúc</p>
<img src="picture1a.png">
</header>

<!-- THƠ TRUYỆN -->
<section>
<div class="section-title">🌼 Thơ truyện</div>
<div class="grid">

<div class="card" onclick="playSound();openVideo('gC-z-z3rzt4')">
<img src="https://img.youtube.com/vi/gC-z-z3rzt4/0.jpg">
<div class="card-title">Mùa xuân đã về</div>
</div>

<div class="card" onclick="playSound();openVideo('z13QgT3YMSM')">
<img src="https://img.youtube.com/vi/z13QgT3YMSM/0.jpg">
<div class="card-title">Cây táo</div>
</div>

</div>
</section>

<!-- CHƠI MÀ HỌC -->
<section>
<div class="section-title">🎨 Chơi mà học</div>
<div class="grid">

<div class="card" onclick="playSound();openVideo('hZ0Dvj_qV60')">
<img src="https://img.youtube.com/vi/hZ0Dvj_qV60/0.jpg">
<div class="card-title">Vẽ tia nắng</div>
</div>

</div>
</section>

<!-- TRÒ CHƠI -->
<section>
<div class="section-title">🎮 Trò chơi</div>
<div class="grid">

<div class="card" onclick="playSound()">
<a href="https://www.tinytap.com/activities/g63vz/play" target="_blank">
<img src="gauu.png">
<div class="card-title">Ghép hình chú gấu</div>
</a>
</div>

<div class="card" onclick="playSound()">
<a href="https://www.tinytap.com/activities/g63fm/play" target="_blank">
<img src="timban.png">
<div class="card-title">Tìm bạn lớp</div>
</a>
</div>

</div>
</section>

<footer style="text-align:center;padding:20px;">
<h3>Cô Trần Thuỳ Dung</h3>
<a class="btn" href="tel:0914194516">Gọi điện</a>
<a class="btn" href="https://zalo.me/0914194516">Zalo</a>
</footer>

<!-- POPUP -->
<div id="videoModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeVideo()">×</span>
<iframe id="videoFrame"></iframe>
</div>
</div>

<!-- ÂM THANH -->
<audio id="clickSound">
<source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<script>
function playSound(){
document.getElementById("clickSound").play();
}

function openVideo(id){
document.getElementById("videoModal").style.display = "block";
document.getElementById("videoFrame").src = "https://www.youtube.com/embed/" + id;
}

function closeVideo(){
document.getElementById("videoModal").style.display = "none";
document.getElementById("videoFrame").src = "";
}
</script>

</body>
</html>
