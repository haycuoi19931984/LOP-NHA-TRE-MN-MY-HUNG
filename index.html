<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mầm non Mỹ Hưng</title>

<style>
body {
    margin: 0;
    font-family: 'Arial Rounded MT Bold', Arial;
    background: #fff7fb;
}

/* HERO */
.hero {
    height: 300px;
    background: url("hero.jpg") center/cover no-repeat;
    position: relative;
}

.hero::after {
    content:"";
    position:absolute;
    inset:0;
    background:rgba(255,105,135,0.4);
}

.hero-text {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    text-align:center;
    z-index:2;
}

/* SECTION */
.section {
    padding:20px;
}

.title {
    text-align:center;
    color:#ff6f91;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
}

/* CARD */
.card {
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.thumbnail {
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
}

.card p {
    text-align:center;
    padding:8px;
    font-size:14px;
}

/* BUTTON */
.btn {
    display:inline-block;
    background:#ff8fab;
    color:white;
    padding:10px 15px;
    border-radius:20px;
    text-decoration:none;
    margin:5px;
}

/* VIDEO POPUP */
.modal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal iframe {
    width:90%;
    height:50%;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div class="hero-text">
<h2>Lớp Nhà trẻ 24-36 tháng</h2>
<p>Nơi cất cánh những em bé hạnh phúc 🌈</p>
</div>
</div>

<!-- THƠ TRUYỆN -->
<div class="section">
<h3 class="title">📖 Thơ truyện</h3>
<p>Giúp bé phát triển ngôn ngữ</p>

<div class="grid">

<div class="card" onclick="playVideo('gC-z-z3rzt4')">
<img class="thumbnail" src="https://img.youtube.com/vi/gC-z-z3rzt4/hqdefault.jpg">
<p>Mùa xuân đã về</p>
</div>

<div class="card" onclick="playVideo('z13QgT3YMSM')">
<img class="thumbnail" src="https://img.youtube.com/vi/z13QgT3YMSM/hqdefault.jpg">
<p>Cây táo</p>
</div>

<div class="card" onclick="playVideo('JjxHA1bwaac')">
<img class="thumbnail" src="https://img.youtube.com/vi/JjxHA1bwaac/hqdefault.jpg">
<p>Đôi bạn nhỏ</p>
</div>

</div>
</div>

<!-- CHƠI MÀ HỌC -->
<div class="section">
<h3 class="title">🎨 Chơi mà học</h3>

<div class="grid">

<div class="card" onclick="playVideo('hZ0Dvj_qV60')">
<img class="thumbnail" src="https://img.youtube.com/vi/hZ0Dvj_qV60/hqdefault.jpg">
<p>Bé vẽ tia nắng</p>
</div>

<div class="card" onclick="playVideo('lvxziuP9W-s')">
<img class="thumbnail" src="https://img.youtube.com/vi/lvxziuP9W-s/hqdefault.jpg">
<p>Máy bay</p>
</div>

</div>
</div>

<!-- TRÒ CHƠI -->
<div class="section">
<h3 class="title">🎮 Trò chơi</h3>

<div class="grid">

<div class="card">
<a href="https://www.tinytap.com/activities/g63vz/play/game-ghép-hình-câu-chuyện-chú-gấu-ngoan-ngoãn" target="_blank">
<img class="thumbnail" src="https://via.placeholder.com/400x225">
<p>Ghép hình</p>
</a>
</div>

</div>
</div>

<!-- FOOTER -->
<div class="section" style="text-align:center">
<h3>Cô Trần Thuỳ Dung</h3>
<p>📞 0914 194 516</p>

<a class="btn" href="https://zalo.me/0914194516">Zalo</a>
<a class="btn" href="tel:0914194516">Gọi điện</a>
</div>

<!-- VIDEO MODAL -->
<div id="videoModal" class="modal" onclick="closeVideo()">
<iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script>
function playVideo(id){
    document.getElementById("videoModal").style.display="flex";
    document.getElementById("videoFrame").src="https://www.youtube.com/embed/"+id;
}

function closeVideo(){
    document.getElementById("videoModal").style.display="none";
    document.getElementById("videoFrame").src="";
}
</script>

</body>
</html>
