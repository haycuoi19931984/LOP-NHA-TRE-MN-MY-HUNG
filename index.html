<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lớp Nhà trẻ Mỹ Hưng</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Fredoka',sans-serif;background:#fffafc}

/* HERO */
.hero{position:relative}
.hero img{width:100%;height:420px;object-fit:cover}
.hero-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:white}
.hero-text p{animation:slide 3s infinite alternate}
@keyframes slide{from{transform:translateX(-10px)}to{transform:translateX(10px)}}

/* SECTION */
section{padding:40px 20px}
.section-title{text-align:center;color:#ff4d8d;font-size:24px;margin-bottom:20px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
@media(max-width:1000px){.grid{grid-template-columns:repeat(2,1fr)}}

/* CARD */
.card{background:white;border-radius:15px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.1);cursor:pointer}
.card:hover{transform:scale(1.05)}
.card img{width:100%}
.card-title{text-align:center;color:#ff4d8d;padding:10px;background:#fff0f6}
.card-info{text-align:center;font-size:13px;padding-bottom:10px}

/* POPUP */
.modal{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.7)}
.modal iframe{width:80%;height:500px;margin:5% auto;display:block}

/* FOOTER */
footer{text-align:center;padding:30px;background:#00bfa6;color:white}
.btn{background:white;color:#ff4d8d;padding:10px 15px;border-radius:20px;margin:5px;text-decoration:none}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<img src="picture1a.png">
<div class="hero-text">
<h1>Lớp Nhà trẻ 24-36 tháng</h1>
<p>Nơi cất cánh những em bé hạnh phúc</p>
</div>
</div>

<!-- HÀM TẠO VIDEO -->
<script>
function videoCard(id,title,topic,level){
return `
<div class="card" onclick="openVideo('${id}')">
<img src="https://img.youtube.com/vi/${id}/0.jpg">
<div class="card-title">${title}</div>
<div class="card-info">Chủ đề: ${topic} | Mức độ: ${level}</div>
</div>`
}
function videoCardNoLevel(id,title){
return `
<div class="card" onclick="openVideo('${id}')">
<img src="https://img.youtube.com/vi/${id}/0.jpg">
<div class="card-title">${title}</div>
</div>`
}
</script>

<!-- GÓC THƠ TRUYỆN -->
<section>
<div class="section-title">📖 Góc Thơ truyện</div>
<div class="grid" id="tho"></div>
</section>

<!-- GÓC CHƠI MÀ HỌC -->
<section>
<div class="section-title">🎨 Góc Chơi mà học</div>
<div class="grid" id="choi"></div>
</section>

<!-- GÓC KỸ NĂNG -->
<section>
<div class="section-title">🧠 Góc Kỹ năng sống</div>
<div class="grid" id="kynang"></div>
</section>

<!-- TRÒ CHƠI -->
<section>
<div class="section-title">🎮 Trò chơi tương tác</div>
<div class="grid">

<a href="https://www.tinytap.com/activities/g63vz/play" target="_blank" class="card">
<img src="gauu.png"><div class="card-title">Ghép hình chú gấu</div>
</a>

<a href="https://www.tinytap.com/activities/g63fm/play" target="_blank" class="card">
<img src="timban.png"><div class="card-title">Tìm bạn lớp</div>
</a>

<a href="https://www.tinytap.com/activities/g64h4/play" target="_blank" class="card">
<img src="cao.png"><div class="card-title">Đôi bạn nhỏ</div>
</a>

<a href="https://www.tinytap.com/activities/draft/?gameId=4db61bd0-1f49-11f1-a184-8d673f5bbb9d" target="_blank" class="card">
<img src="ghep.png"><div class="card-title">Ghép hình</div>
</a>

</div>
</section>

<!-- TUYÊN TRUYỀN -->
<section>
<div class="section-title">👨‍👩‍👧 Góc Tuyên truyền</div>
<div class="grid" id="ph"></div>
</section>

<!-- POPUP -->
<div id="modal" class="modal" onclick="closeVideo()">
<iframe id="frame"></iframe>
</div>

<script>
document.getElementById("tho").innerHTML=
videoCard("z13QgT3YMSM","Cây táo","Cây và hoa","Khó")+
videoCard("JjxHA1bwaac","Hoa kết trái","Cây và hoa","Dễ")+
videoCard("6hr1xaMlRjc","Quả thị","Cây và hoa","TB")+
videoCard("aQ3pcr39IHU","Cháu chào ông","Gia đình","Dễ")+
videoCard("gC-z-z3rzt4","Sóc nâu kể chuyện","Bé và bạn","Khó");

document.getElementById("choi").innerHTML=
videoCard("LUPsqgFvnqo","Màu sắc","Bé và bạn","Dễ")+
videoCard("g-2vmNxl5wQ","Hình dạng","Đồ chơi","TB")+
videoCard("Oku9tPqSDjA","Máy bay","Giao thông","TB")+
videoCard("qv4_7QiWDsg","Con vật","Động vật","Dễ")+
videoCard("k5mIJ8TY06w","Khám phá","Động vật","TB")+
videoCard("EqTMVMslE5Y","Mùa hè","Mùa hè","Dễ");

document.getElementById("kynang").innerHTML=
videoCard("z5fwPqe8mIs","Giao tiếp","Bé và bạn","TB")+
videoCard("prr2Bxcs048","Thói quen","Gia đình","Dễ")+
videoCard("fu32XsS4elU","Hành vi","Đồ chơi","TB")+
videoCard("dSuUTlMml9k","Thể dục","Bé và bạn","TB")+
videoCard("yMhECbNn0Ts","Ném bóng","Bé và bạn","Dễ");

document.getElementById("ph").innerHTML=
videoCardNoLevel("E0fYrZzm2Hk","Khám phá thiên nhiên")+
videoCardNoLevel("umVlxnnQMic","Học tại nhà");

function openVideo(id){
modal.style.display="block";
frame.src="https://www.youtube.com/embed/"+id;
}
function closeVideo(){
modal.style.display="none";
frame.src="";
}
</script>

<!-- FOOTER -->
<footer>
<h3>👩‍🏫 Cô Trần Thuỳ Dung</h3>

</footer>

</body>
</html>
