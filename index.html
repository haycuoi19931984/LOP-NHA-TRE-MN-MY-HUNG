<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lớp Nhà trẻ 24-36 tháng</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Fredoka', sans-serif;
    margin: 0;
    background: #fffafc;
}

/* ===== SLIDER ===== */
.slider {
    position: relative;
    height: 420px;
    overflow: hidden;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: 1s;
}

.slide.active {
    opacity: 1;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TEXT */
.hero-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    color: white;
    text-align: center;
}

.hero-text h1 {
    font-size: 36px;
    text-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.hero-text p {
    color: #ffd6e7;
    font-size: 18px;
}

/* BONG BÓNG */
.bubble {
    position: absolute;
    bottom: -50px;
    width: 20px;
    height: 20px;
    background: pink;
    border-radius: 50%;
    animation: float 6s infinite;
}

@keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-600px);}
}

/* GRID 4 */
.grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 15px;
    padding: 30px;
}

@media(max-width:1000px){
.grid{grid-template-columns:repeat(2,1fr);}
}

/* CARD */
.card {
    border-radius: 15px;
    overflow: hidden;
    background: white;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

.card:hover {
    transform: scale(1.05);
}

.card::after {
    content:"▶";
    position:absolute;
    font-size:40px;
    color:white;
    top:40%;
    left:45%;
    opacity:0;
}

.card:hover::after {
    opacity:1;
}

.card img {
    width:100%;
}

/* TITLE */
.card-title {
    text-align:center;
    color:#ff4d8d;
    padding:10px;
    background:#fff0f6;
}

/* POPUP */
.modal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
}

.modal iframe {
    width:80%;
    height:500px;
    margin:5% auto;
    display:block;
}

/* FLOAT BUTTON */
.float-btn {
    position:fixed;
    right:20px;
    bottom:20px;
    display:flex;
    flex-direction:column;
}

.float-btn a {
    margin:5px;
    padding:10px;
    background:#ff4d8d;
    color:white;
    border-radius:50%;
    text-align:center;
    text-decoration:none;
}

/* FOOTER */
footer {
    background:linear-gradient(#00bfa6,#6fe7dd);
    text-align:center;
    padding:30px;
    color:white;
}
</style>
</head>

<body>

<!-- SLIDER -->
<div class="slider">
<div class="slide active"><img src="picture1a.png"></div>
<div class="slide"><img src="picture1a.png"></div>

<div class="hero-text">
<h1>Lớp Nhà trẻ 24-36 tháng</h1>
<p>🌈 Nơi ươm mầm những em bé hạnh phúc</p>
</div>

<!-- BONG BÓNG -->
<div class="bubble" style="left:10%"></div>
<div class="bubble" style="left:30%"></div>
<div class="bubble" style="left:60%"></div>
</div>

<!-- VIDEO -->
<div class="grid">

<div class="card" onclick="playSound();openVideo('gC-z-z3rzt4')">
<img src="https://img.youtube.com/vi/gC-z-z3rzt4/0.jpg">
<div class="card-title">Mùa xuân đã về</div>
</div>

<div class="card" onclick="playSound();openVideo('z13QgT3YMSM')">
<img src="https://img.youtube.com/vi/z13QgT3YMSM/0.jpg">
<div class="card-title">Cây táo</div>
</div>

<div class="card" onclick="playSound();openVideo('aQ3pcr39IHU')">
<img src="https://img.youtube.com/vi/aQ3pcr39IHU/0.jpg">
<div class="card-title">Cháu chào ông</div>
</div>

<div class="card" onclick="playSound();openVideo('JjxHA1bwaac')">
<img src="https://img.youtube.com/vi/JjxHA1bwaac/0.jpg">
<div class="card-title">Hoa kết trái</div>
</div>

</div>

<!-- POPUP -->
<div id="modal" class="modal" onclick="closeVideo()">
<iframe id="frame"></iframe>
</div>

<!-- FLOAT BUTTON -->
<div class="float-btn">
<a href="tel:0914194516">📞</a>
<a href="https://zalo.me/0914194516">💬</a>
</div>

<!-- FOOTER -->
<footer>
<h3>👩‍🏫 Cô Trần Thuỳ Dung</h3>
<p>📞 0914 194 516</p>
<p>Lớp Nhà trẻ 24-36 tháng - Trường Mầm non Mỹ Hưng</p>
</footer>

<!-- SOUND -->
<audio id="sound">
<source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<script>
function playSound(){
document.getElementById("sound").play();
}

function openVideo(id){
document.getElementById("modal").style.display="block";
document.getElementById("frame").src="https://www.youtube.com/embed/"+id;
}

function closeVideo(){
document.getElementById("modal").style.display="none";
document.getElementById("frame").src="";
}

/* SLIDER AUTO */
let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);
</script>

</body>
</html>
