<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lớp Nhà trẻ 24-36 tháng</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Quicksand', sans-serif;
    margin: 0;
    background: #fffafc;
}

header {
    background: linear-gradient(135deg, #ffd6e0, #c8f7ff);
    text-align: center;
    padding: 40px 20px;
}

header img {
    width: 100%;
    max-height: 350px;
    object-fit: cover;
    border-radius: 20px;
}

h1 { color: #ff6b81; }

section { padding: 40px 20px; }

.section-title {
    text-align: center;
    font-size: 26px;
    color: #ff7aa2;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
}

.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
    text-align: center;
}

.card:hover {
    transform: translateY(-8px) scale(1.02);
}

.card img {
    width: 100%;
}

.card-title {
    padding: 10px;
    font-weight: 600;
    color: #444;
}

/* Popup */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
}

.modal-content {
    position: relative;
    margin: 5% auto;
    width: 80%;
}

.modal iframe {
    width: 100%;
    height: 500px;
}

.close {
    position: absolute;
    top: -30px;
    right: 0;
    font-size: 30px;
    color: white;
    cursor: pointer;
}

/* Animation */
.fade {
    opacity: 0;
    transform: translateY(40px);
    transition: 0.8s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

footer {
    background: #ffd6e0;
    text-align: center;
    padding: 30px;
}

.btn {
    padding: 10px 20px;
    background: #ff6b81;
    color: white;
    border-radius: 20px;
    text-decoration: none;
    margin: 10px;
}
</style>
</head>

<body>

<header>
    <h1>Lớp Nhà trẻ 24-36 tháng - Trường Mầm non Mỹ Hưng</h1>
    <p>Nơi cất cánh những em bé hạnh phúc</p>
    <img src="picture1a.png">
</header>

<!-- THƠ TRUYỆN -->
<section class="fade">
    <div class="section-title">🌼 Thơ truyện</div>
    <div class="grid">

        <div class="card" onclick="openVideo('gC-z-z3rzt4')">
            <img src="https://img.youtube.com/vi/gC-z-z3rzt4/0.jpg">
            <div class="card-title">Mùa xuân đã về</div>
        </div>

        <div class="card" onclick="openVideo('z13QgT3YMSM')">
            <img src="https://img.youtube.com/vi/z13QgT3YMSM/0.jpg">
            <div class="card-title">Kịch rối bóng Cây táo</div>
        </div>

        <div class="card" onclick="openVideo('aQ3pcr39IHU')">
            <img src="https://img.youtube.com/vi/aQ3pcr39IHU/0.jpg">
            <div class="card-title">Cháu chào ông ạ</div>
        </div>

        <div class="card" onclick="openVideo('JjxHA1bwaac')">
            <img src="https://img.youtube.com/vi/JjxHA1bwaac/0.jpg">
            <div class="card-title">Hoa kết trái</div>
        </div>

        <div class="card" onclick="openVideo('6hr1xaMlRjc')">
            <img src="https://img.youtube.com/vi/6hr1xaMlRjc/0.jpg">
            <div class="card-title">Phim Quả thị</div>
        </div>

    </div>
</section>

<!-- CHƠI MÀ HỌC -->
<section class="fade">
    <div class="section-title">🎨 Chơi mà học</div>
    <div class="grid">

        <div class="card" onclick="openVideo('hZ0Dvj_qV60')">
            <img src="https://img.youtube.com/vi/hZ0Dvj_qV60/0.jpg">
            <div class="card-title">Vẽ tia nắng</div>
        </div>

        <div class="card" onclick="openVideo('lvxziuP9W-s')">
            <img src="https://img.youtube.com/vi/lvxziuP9W-s/0.jpg">
            <div class="card-title">Tìm hiểu máy bay</div>
        </div>

        <div class="card" onclick="openVideo('dSuUTlMml9k')">
            <img src="https://img.youtube.com/vi/dSuUTlMml9k/0.jpg">
            <div class="card-title">Thể dục buổi sáng</div>
        </div>

        <div class="card" onclick="openVideo('yMhECbNn0Ts')">
            <img src="https://img.youtube.com/vi/yMhECbNn0Ts/0.jpg">
            <div class="card-title">Ném bóng</div>
        </div>

    </div>
</section>

<footer>
    <h3>Cô Trần Thuỳ Dung - 0914 194 516</h3>
    <a class="btn" href="https://zalo.me/0914194516">Zalo</a>
    <a class="btn" href="tel:0914194516">Gọi điện</a>
</footer>

<!-- POPUP -->
<div id="videoModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeVideo()">×</span>
        <iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<script>
function openVideo(id){
    document.getElementById("videoModal").style.display = "block";
    document.getElementById("videoFrame").src = "https://www.youtube.com/embed/" + id;
}

function closeVideo(){
    document.getElementById("videoModal").style.display = "none";
    document.getElementById("videoFrame").src = "";
}

// animation
const items = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
    items.forEach(el => {
        if(el.getBoundingClientRect().top < window.innerHeight - 100){
            el.classList.add('show');
        }
    });
});
</script>

</body>
</html>
