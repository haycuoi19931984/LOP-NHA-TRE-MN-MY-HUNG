<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mầm non Mỹ Hưng</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff7fb;
}

/* HERO */
.hero {
    height: 350px;
    background: url("picture1.png") center/cover no-repeat;
    position: relative;
}

.hero::after {
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.3);
}

.hero-text {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    text-align:center;
    z-index:2;
}

.hero-text h1 {
    font-size: 24px;
}

/* SECTION */
.section {
    padding:20px;
}

.title {
    text-align:center;
    color:#ff6f91;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
}

/* CARD */
.card {
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
    cursor:pointer;
}

.thumbnail {
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
}

.card p {
    text-align:center;
    padding:8px;
    font-size:14px;
}

/* VIDEO POPUP */
.modal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal iframe {
    width:90%;
    height:50%;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <div class="hero-text">
        <h1>Nơi ươm mầm những em bé hạnh phúc 🌈</h1>
    </div>
</div>

<!-- THƠ TRUYỆN -->
<div class="section">
<h2 class="title">📖 Thơ truyện</h2>

<div class="grid">

<div class="card" onclick="playVideo('gC-z-z3rzt4')">
<img class="thumbnail" src="https://img.youtube.com/vi/gC-z-z3rzt4/hqdefault.jpg">
<p>Mùa xuân đã về</p>
</div>

<div class="card" onclick="playVideo('z13QgT3YMSM')">
<img class="thumbnail" src="https://img.youtube.com/vi/z13QgT3YMSM/hqdefault.jpg">
<p>Cây táo</p>
</div>

<div class="card" onclick="playVideo('JjxHA1bwaac')">
<img class="thumbnail" src="https://img.youtube.com/vi/JjxHA1bwaac/hqdefault.jpg">
<p>Đôi bạn nhỏ</p>
</div>

<div class="card" onclick="playVideo('aQ3pcr39IHU')">
<img class="thumbnail" src="https://img.youtube.com/vi/aQ3pcr39IHU/hqdefault.jpg">
<p>Cháu chào ông ạ</p>
</div>

<div class="card" onclick="playVideo('6hr1xaMlRjc')">
<img class="thumbnail" src="https://img.youtube.com/vi/6hr1xaMlRjc/hqdefault.jpg">
<p>Quả thị</p>
</div>

</div>
</div>

<!-- VIDEO MODAL -->
<div id="videoModal" class="modal" onclick="closeVideo()">
<iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script>
function playVideo(id){
    document.getElementById("videoModal").style.display="flex";
    document.getElementById("videoFrame").src="https://www.youtube.com/embed/"+id;
}

function closeVideo(){
    document.getElementById("videoModal").style.display="none";
    document.getElementById("videoFrame").src="";
}
</script>

</body>
</html>
