<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lớp Nhà trẻ Mỹ Hưng</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f7fa;
}

/* MENU */
.navbar {
    background: #ff8fab;
    padding: 10px;
    text-align: center;
}

.navbar a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

/* HERO */
.hero {
    position: relative;
    text-align: center;
    color: white;
}

.hero img {
    width: 100%;
    height: 320px;
    object-fit: cover;
    filter: brightness(70%);
}

.hero-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* SECTION */
.section {
    padding: 25px;
}

.title {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* IMAGE */
.thumbnail {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    transition: 0.3s;
}

.card:hover .thumbnail {
    transform: scale(1.05);
}

.card p {
    padding: 10px;
    font-weight: bold;
    text-align: center;
}

/* BUTTON */
.button {
    display: inline-block;
    background: #ff8fab;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    margin: 5px;
    text-decoration: none;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="navbar">
    <a href="#">Trang chủ</a>
    <a href="#tho">Thơ truyện</a>
    <a href="#choi">Chơi mà học</a>
    <a href="#game">Trò chơi</a>
</div>

<!-- HERO -->
<div class="hero">
    <img src="https://drive.google.com/uc?export=view&id=16CAo7WW9TYNEAC1kkybdEzGIhl83sn75">
    <div class="hero-text">
        <h1>Lớp Nhà trẻ 24-36 tháng</h1>
        <p>Nơi ươm mầm những em bé hạnh phúc</p>
    </div>
</div>

<!-- THƠ TRUYỆN -->
<div class="section" id="tho">
    <h2 class="title">📖 Thơ Truyện</h2>
    <div class="grid">

        <div class="card">
            <a href="https://youtu.be/gC-z-z3rzt4" target="_blank">
                <img class="thumbnail" src="https://img.youtube.com/vi/gC-z-z3rzt4/hqdefault.jpg">
            </a>
            <p>Mùa xuân đã về</p>
        </div>

        <div class="card">
            <a href="https://youtu.be/z13QgT3YMSM" target="_blank">
                <img class="thumbnail" src="https://img.youtube.com/vi/z13QgT3YMSM/hqdefault.jpg">
            </a>
            <p>Cây táo</p>
        </div>

        <div class="card">
            <a href="https://youtu.be/JjxHA1bwaac" target="_blank">
                <img class="thumbnail" src="https://img.youtube.com/vi/JjxHA1bwaac/hqdefault.jpg">
            </a>
            <p>Đôi bạn nhỏ</p>
        </div>

    </div>
</div>

<!-- CHƠI MÀ HỌC -->
<div class="section" id="choi">
    <h2 class="title">🎨 Chơi mà học</h2>
    <div class="grid">

        <div class="card">
            <a href="https://youtu.be/hZ0Dvj_qV60" target="_blank">
                <img class="thumbnail" src="https://img.youtube.com/vi/hZ0Dvj_qV60/hqdefault.jpg">
            </a>
            <p>Bé vẽ tia nắng</p>
        </div>

        <div class="card">
            <a href="https://youtu.be/lvxziuP9W-s" target="_blank">
                <img class="thumbnail" src="https://img.youtube.com/vi/lvxziuP9W-s/hqdefault.jpg">
            </a>
            <p>Tìm hiểu máy bay</p>
        </div>

    </div>
</div>

<!-- TRÒ CHƠI -->
<div class="section" id="game">

    <div class="grid">

        <div class="card">

    </div>
</div>

</div>

</body>
</html>
